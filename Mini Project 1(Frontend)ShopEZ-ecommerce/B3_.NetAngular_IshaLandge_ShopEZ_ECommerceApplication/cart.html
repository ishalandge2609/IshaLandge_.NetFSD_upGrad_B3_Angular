<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart – ShopEZ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="bi bi-stars"></i>Shop<span>EZ</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
       
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door me-2"></i>Home</a></li>
        <li class="nav-item"><a class="nav-link" href="products.html"><i class="bi bi-bag-check me-2"></i>Products</a></li>
        <li class="nav-item">
          <a href="cart.html" class="nav-link cart-link">
            <i class="bi bi-cart3"></i> Cart <span id="cart-count" style="display:none">0</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>


<!-- PAGE TITLE -->
<div class="page-title-bar">
  <div class="container">
    <h2>Shopping Cart</h2>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
        <li class="breadcrumb-item active">Cart</li>
      </ol>
    </nav>
  </div>
</div>

<div class="container pb-5">
  <div class="row g-4" id="cart-row">

    <!-- Cart items -->
    <div class="col-lg-8" id="cart-items-col">
      <div id="free-ship-msg"
        style="background:#d1fae5;border:1px solid #6ee7b7;border-radius:8px;padding:10px 16px;font-size:13px;color:#065f46;margin-bottom:16px;display:none">
      </div>
      <div id="cart-items-container"></div>
      <div class="mt-3">
        <a href="products.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Continue Shopping</a>
      </div>
    </div>

    <!-- Order summary -->
    <div class="col-lg-4" id="cart-summary-col" style="display:none">
      <div class="summary-box fade-in">
        <h4>Order Summary <small id="summary-count" style="font-size:12px;font-weight:400;color:#6c757d"></small></h4>
        <div class="summary-row"><span>Subtotal</span><span id="summary-subtotal">₹0</span></div>
        <div class="summary-row"><span>Shipping</span><span id="summary-shipping">₹49</span></div>
        <div class="summary-row"><span>GST (18%)</span><span id="summary-tax">₹0</span></div>
        <div class="summary-row total"><span>Total</span><span id="summary-total">₹0</span></div>
        <a href="checkout.html" class="btn btn-primary w-100 mt-3 btn-lg">
          <i class="bi bi-lock me-1"></i>Proceed to Checkout
        </a>
        <div class="text-center mt-3" style="font-size:12px;color:#aaa">
          <i class="bi bi-shield-lock me-1"></i>Secure checkout &nbsp;·&nbsp; <i class="bi bi-arrow-return-left me-1"></i>Easy returns
        </div>
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="container">
    <div class="footer-bottom">© 2026 ShopEZ. All rights reserved.</div>
  </div>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script src="js/cart.js"></script>

</body>
</html>
