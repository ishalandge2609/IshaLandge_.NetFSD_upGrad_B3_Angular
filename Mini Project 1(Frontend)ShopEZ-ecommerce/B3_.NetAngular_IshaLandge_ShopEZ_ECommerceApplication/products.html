<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products – ShopEZ</title>

 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  
  <link rel="stylesheet" href="css/styles.css"/>

 
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
    }

    footer {
      width: 100%;
      background: #1f1f1f;
      color: rgba(255,255,255,0.6);
      padding: 30px 0 15px;
    }

    .footer-bottom {
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<!---------------------------- NAVBAR -------------------->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-stars"></i>Shop<span>EZ</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-center gap-2">

        <!-----------------------------------Search -------------------------------->
        <li>
          <div style="position:relative;max-width:280px;width:100%">
            <input type="text" id="search-input" placeholder="Search products…" class="form-control" style="padding-left:36px"/>
            <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#999;font-size:14px"><i class="bi bi-search"></i></span>
          </div>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="index.html"><i class="bi bi-house-door me-2"></i>Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link active" href="products.html"><i class="bi bi-bag-check me-2"></i>Products</a>
        </li>


        <li class="nav-item">
          <a href="cart.html" class="nav-link cart-link">
            <i class="bi bi-cart3"></i> Cart <span id="cart-count" style="display:none">0</span>
          </a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT ------------------------------------>
<main>

  <!-------------------------------PAGE TITLe-------------------------------- -->
  <div class="page-title-bar">
    <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
      <div>
        <h2>All Products</h2>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-item active">Products</li>
          </ol>
        </nav>
      </div>
    </div>
  </div>

  <!-------------------------------- PRODUCTS SECTION------------------------->
  <div class="container pb-5">

    <!-- Filters -->
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" data-cat="All"><i class="bi bi-grid-fill me-1"></i>All</button>
      <button class="filter-btn" data-cat="Furniture"><i class="bi bi-lamp me-1"></i>Furniture</button>
      <button class="filter-btn" data-cat="Lighting"><i class="bi bi-lightbulb me-1"></i>Lighting</button>
      <button class="filter-btn" data-cat="Planters"><i class="bi bi-flower1 me-1"></i>Planters</button>
      <button class="filter-btn" data-cat="Kitchen & Dining"><i class="bi bi-cup-hot me-1"></i>Kitchen & Dining</button>
      <button class="filter-btn" data-cat="Bathroom Decor"><i class="bi bi-droplet me-1"></i>Bathroom Decor</button>
      <button class="filter-btn" data-cat="Decorative Items"><i class="bi bi-palette me-1"></i>Decorative Items</button>
    </div>

    <!-- Sort -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <span id="result-count" style="font-size:13px;color:#6c757d"></span>
      <select id="sort-select" class="form-select form-select-sm" style="width:auto">
        <option value="">Sort: Default</option>
        <option value="asc">Price: Low to High</option>
        <option value="desc">Price: High to Low</option>
      </select>
    </div>

    <!-- Product Grid -->
    <div class="row" id="product-grid">
      <div class="col-12 text-center py-5">
        <div class="spinner-border text-primary"></div>
      </div>
    </div>

  </div>

</main>

<!-----------------------------FOOTER ------------------------>
<footer>
  <div class="footer-bottom">
    
    © 2026 ShopEZ. All rights reserved.
  </div>
</footer>

<!------------------------JS ----------------------------- -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script src="js/products.js"></script>

<script>
  var allProducts = [];
  var activeCat = 'All';
  var searchQuery = '';
  var sortOrder = '';

  function getFiltered() {
    var list = allProducts.slice();

    if (activeCat !== 'All') {
      var catLower = activeCat.trim().toLowerCase();
      list = list.filter(function(p) {
        return p.category && p.category.trim().toLowerCase() === catLower;
      });
    }

    if (searchQuery) {
      var q = searchQuery.toLowerCase();
      list = list.filter(function(p) {
        return p.name.toLowerCase().includes(q) ||
               p.description.toLowerCase().includes(q);
      });
    }

    if (sortOrder === 'asc') list.sort(function(a,b){ return a.price - b.price; });
    if (sortOrder === 'desc') list.sort(function(a,b){ return b.price - a.price; });

    return list;
  }

  function render() {
    var list = getFiltered();
    $('#result-count').text(list.length + ' product(s) found');
    displayProducts(list, '#product-grid');
    bindAddToCartButtons(allProducts);
  }

  $(function () {

    var params = new URLSearchParams(window.location.search);
    var catParam = params.get('cat');
    if (catParam) {
      activeCat = catParam;
      // Highlight the matching filter button
      $('.filter-btn').removeClass('active');
      var matched = false;
      $('.filter-btn').each(function () {
        if ($(this).data('cat') === catParam) {
          $(this).addClass('active');
          matched = true;
        }
      });
      if (!matched) {
        $('.filter-btn[data-cat="All"]').addClass('active');
        activeCat = 'All';
      }
    }

    loadProducts(function(products) {
      allProducts = products;
      render();
    });

    $(document).on('click', '.filter-btn', function () {
      $('.filter-btn').removeClass('active');
      $(this).addClass('active');
      activeCat = $(this).data('cat');
      render();
    });

    $('#search-input').on('input', function () {
      searchQuery = $(this).val().trim();
      render();
    });

    $('#sort-select').on('change', function () {
      sortOrder = $(this).val();
      render();
    });

  });
</script>

</body>
</html>
