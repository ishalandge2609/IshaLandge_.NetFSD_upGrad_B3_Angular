<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Details – ShopEZ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!----------------------------- NAVBAR --------------------------- -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="bi bi-stars"></i>Shop<span>EZ</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
       
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door me-2"></i>Home</a></li>
        <li class="nav-item"><a class="nav-link" href="products.html"><i class="bi bi-bag-check me-2"></i>Products</a></li>
        
        <li class="nav-item">
          <a href="cart.html" class="nav-link cart-link">
            <i class="bi bi-cart3"></i> Cart <span id="cart-count" style="display:none">0</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<!------------------------------------BREADCRUMB -------------------------------------->
<div class="page-title-bar">
  <div class="container">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
        <li class="breadcrumb-item"><a href="products.html">Products</a></li>
        <li class="breadcrumb-item active" id="bc-name">Loading…</li>
      </ol>
    </nav>
  </div>
</div>

<!------------------------------- PRODUCT DETAIL BODY-------------------------- -->
<div class="container py-5" id="detail-container">
  <div class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>
</div>

<!----------------------------------- RELATED PRODUCTS ------------------------------->
<div class="container pb-5" id="related-section" style="display:none">
  <hr style="border-color:#e0e0e0"/>
  <div class="mb-4">
    <div class="section-line"></div>
    <h3 class="section-heading" style="font-size:22px">You May Also Like</h3>
  </div>
  <div class="row" id="related-grid"></div>
</div>

<!------------------------------ FOOTER-------------------------------------- -->
<footer>
  <div class="container">
    <div class="footer-bottom">© 2026 ShopEZ. All rights reserved.</div>
  </div>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script src="js/products.js"></script>
<script>
  $(function () {
    var params  = new URLSearchParams(window.location.search);
    var id      = parseInt(params.get('id'));
    if (!id) { window.location.href = 'products.html'; return; }

    loadProducts(function (products) {
      var product = null;
      for (var i = 0; i < products.length; i++) {
        if (products[i].id === id) { product = products[i]; break; }
      }
      if (!product) { window.location.href = 'products.html'; return; }

      document.title = product.name + ' – ShopEZ';
      $('#bc-name').text(product.name);

      $('#detail-container').html(
        '<div class="row g-5 fade-in">' +
          '<div class="col-md-5">' +
            '<img class="detail-img" src="' + product.image + '" alt="' + product.name + '"/>' +
          '</div>' +
          '<div class="col-md-7">' +
            '<span class="detail-category">' + product.category + '</span>' +
            '<h1 class="detail-name">' + product.name + '</h1>' +
            '<div class="detail-price">' + formatPrice(product.price) + '</div>' +
            '<p class="detail-desc">' + product.description + '</p>' +
            '<div class="detail-meta">' +
              '<div class="detail-meta-item"><strong>Brand</strong>' + product.name.split(' ')[0] + '</div>' +
              '<div class="detail-meta-item"><strong>Category</strong>' + product.category + '</div>' +
              '<div class="detail-meta-item"><strong>Stock</strong><i class="bi bi-check-circle-fill text-success me-1"></i>In Stock</div>' +
              '<div class="detail-meta-item"><strong>Warranty</strong>1 Year</div>' +
            '</div>' +
            '<div class="d-flex align-items-center gap-3 mb-4 flex-wrap">' +
              '<div class="qty-wrap">' +
                '<button id="qty-minus">−</button>' +
                '<input type="text" inputmode="numeric" pattern="[0-9]*" id="qty-val" value="1"/>' +
                '<button id="qty-plus">+</button>' +
              '</div>' +
              '<button id="add-to-cart-btn" class="btn btn-primary btn-lg" style="gap:8px;display:inline-flex;align-items:center">' +
                '<i class="bi bi-cart-plus me-1"></i>Add to Cart' +
              '</button>' +
              '<a href="cart.html" class="btn btn-outline-secondary btn-lg">View Cart</a>' +
            '</div>' +
            '<div class="d-flex gap-3 flex-wrap" style="font-size:13px;color:#6c757d">' +
              '<span><i class="bi bi-truck me-1"></i>Free shipping above ₹50,000</span>' +
              '<span><i class="bi bi-arrow-return-left me-1"></i>7-day returns</span>' +
              '<span><i class="bi bi-shield-lock me-1"></i>Secure checkout</span>' +
            '</div>' +
          '</div>' +
        '</div>'
      );

      // Qty controls
      $('#qty-minus').on('click', function () {
        var v = parseInt($('#qty-val').val()) || 1;
        if (v > 1) $('#qty-val').val(v - 1);
      });
      $('#qty-plus').on('click', function () {
        var v = parseInt($('#qty-val').val()) || 1;
        $('#qty-val').val(v + 1);
      });

      // Add to cart
      $('#add-to-cart-btn').on('click', function () {
        var qty = parseInt($('#qty-val').val()) || 1;
        Cart.addToCart(product, qty);
        $(this).html('<i class="bi bi-check-lg me-1"></i>Added!');
        setTimeout(function () { $('#add-to-cart-btn').html('<i class="bi bi-cart-plus me-1"></i>Add to Cart'); }, 1500);
      });

      // Related products (same category, exclude current)
      var related = products.filter(function (p) {
        return p.category === product.category && p.id !== id;
      }).slice(0, 4);

      if (related.length) {
        $('#related-section').show();
        displayProducts(related, '#related-grid');
        bindAddToCartButtons(products);
      }
    });
  });
</script>

</body>
</html>
